<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strix Admin — Dashboard</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0j0j0j;
            --accent: #C8F5B0;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #222222;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: #0f0f0f;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1.5rem;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text);
            margin-bottom: 3rem;
        }

        .project-list {
            flex: 1;
            overflow-y: auto;
        }

        .nav-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .project-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .project-item:hover { background: #1a1a1a; color: #fff; }
        .project-item.active { background: var(--accent); color: #000; font-weight: 600; }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 3rem 4rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; }

        .actions { display: flex; gap: 1rem; }

        .form-section {
            background: #0f0f0f;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .section-title { font-size: 0.75rem; color: var(--accent); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 2; }

        label { font-size: 0.75rem; color: var(--text-dim); }
        input, textarea, select {
            background: #050505;
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--text);
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { min-height: 100px; }

        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-save { background: var(--accent); color: #000; }
        .btn-delete { background: #222; color: #ff6b6b; }
        .btn:hover { opacity: 0.8; }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 600;
            display: none;
            transition: background 0.2s;
        }
        .toast.error {
            background: #ff6b6b;
            color: #fff;
        }
        .toast.saving {
            background: #888;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">STRIX ADMIN</div>
        <p class="nav-label">Projects</p>
        <div class="project-list" id="projectList"></div>
    </div>

    <div class="main">
        <div id="editorUI" style="display: none;">
            <div class="header">
                <h1 id="headerTitle">Select Project</h1>
                <div class="actions">
                    <button class="btn btn-delete" onclick="deleteProject()">Delete</button>
                    <button class="btn btn-save" onclick="saveData()">Update UI</button>
                </div>
            </div>

            <div class="form-section">
                <p class="section-title">General Info</p>
                <div class="form-grid">
                    <div class="form-group"><label>ID</label><input type="text" id="p-id"></div>
                    <div class="form-group"><label>Title</label><input type="text" id="p-title" oninput="document.getElementById('headerTitle').textContent = this.value"></div>
                    <div class="form-group"><label>Industry</label><input type="text" id="p-industry"></div>
                    <div class="form-group"><label>Abbr</label><input type="text" id="p-abbr"></div>
                    <div class="form-group full"><label>Cover Photo URL (filename or link)</label><input type="text" id="p-thumb" oninput="updatePreview('p-preview', this.value)"></div>
                    <div class="form-group full">
                        <label>Image Preview</label>
                        <div style="width: 100%; height: 150px; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                            <img id="p-preview" src="" style="max-width: 100%; max-height: 100%; object-fit: cover;" onerror="this.style.display='none'" onload="this.style.display='block'">
                        </div>
                    </div>
                    <div class="form-group full"><label>Case Study Showcase Image</label><input type="text" id="p-csImage" oninput="updatePreview('p-csPreview', this.value)"></div>
                    <div class="form-group full">
                        <label>Showcase Preview</label>
                        <div style="width: 100%; height: 150px; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                            <img id="p-csPreview" src="" style="max-width: 100%; max-height: 100%; object-fit: cover;" onerror="this.style.display='none'" onload="this.style.display='block'">
                        </div>
                    </div>
                    <div class="form-group full"><label>Description</label><textarea id="p-desc"></textarea></div>
                </div>
            </div>

            <div class="form-section">
                <p class="section-title">Case Study Details</p>
                <div class="form-grid">
                    <div class="form-group"><label>Metric (Short)</label><input type="text" id="p-resShort"></div>
                    <div class="form-group"><label>Metric Label</label><input type="text" id="p-resLabel"></div>
                    <div class="form-group full"><label>Challenge</label><textarea id="p-challengeText"></textarea></div>
                    <div class="form-group full"><label>Approach</label><textarea id="p-approachText"></textarea></div>
                </div>
            </div>
        </div>

        <div id="emptyState" style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
            <p>Select a project from the sidebar to begin editing.</p>
        </div>
    </div>

    <div id="toast" class="toast">UI Updated!</div>

    <script>
        function updatePreview(id, val) {
            const img = document.getElementById(id);
            if(!val) { img.src = ''; return; }
            img.src = encodeURI(val);
        }
        let projects = [];
        let activeId = null;

        async function init() {
            try {
                const res = await fetch('/projects.json');
                projects = await res.json();
                renderList();
            } catch (err) {}
        }

        function renderList() {
            const list = document.getElementById('projectList');
            list.innerHTML = projects.map(p => `
                <div class="project-item ${p.id === activeId ? 'active' : ''}" onclick="selectProject('${p.id}')">
                    ${p.title}
                </div>`).join('');
        }

        function selectProject(id) {
            updateMemory();
            activeId = id;
            const p = projects.find(x => x.id === id);
            if (!p) return;

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('editorUI').style.display = 'block';
            document.getElementById('headerTitle').textContent = p.title;
            
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-title').value = p.title;
            document.getElementById('p-abbr').value = p.abbr;
            document.getElementById('p-desc').value = p.desc;
            document.getElementById('p-industry').value = p.industry;
            document.getElementById('p-thumb').value = p.thumb || '';
            document.getElementById('p-csImage').value = p.csImage || '';
            updatePreview('p-preview', p.thumb || '');
            updatePreview('p-csPreview', p.csImage || '');
            document.getElementById('p-resShort').value = p.resShort || '';
            document.getElementById('p-resLabel').value = p.resLabel || '';
            document.getElementById('p-challengeText').value = p.challengeText || '';
            document.getElementById('p-approachText').value = p.approachText || '';

            renderList();
        }

        function updateMemory() {
            if (activeId) {
                const p = projects.find(x => x.id === activeId);
                if (p) {
                    p.id = document.getElementById('p-id').value;
                    p.title = document.getElementById('p-title').value;
                    p.abbr = document.getElementById('p-abbr').value;
                    p.desc = document.getElementById('p-desc').value;
                    p.industry = document.getElementById('p-industry').value;
                    p.thumb = document.getElementById('p-thumb').value;
                    p.csImage = document.getElementById('p-csImage').value;
                    p.resShort = document.getElementById('p-resShort').value;
                    p.resLabel = document.getElementById('p-resLabel').value;
                    p.challengeText = document.getElementById('p-challengeText').value;
                    p.approachText = document.getElementById('p-approachText').value;
                }
            }
        }

        // ── Persist the in-memory array to projects.json via the API ──
        async function persistToServer() {
            const t = document.getElementById('toast');
            t.className = 'toast saving';
            t.textContent = 'Saving…';
            t.style.display = 'block';

            try {
                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(projects)
                });

                if (!res.ok) throw new Error('Server error');

                t.className = 'toast';
                t.textContent = 'Saved ✓';
                setTimeout(() => { t.style.display = 'none'; }, 2000);
            } catch (err) {
                t.className = 'toast error';
                t.textContent = 'Save failed ✗';
                setTimeout(() => { t.style.display = 'none'; }, 3000);
            }
        }

        function saveData() {
            updateMemory();   // push form values → in-memory array
            renderList();     // refresh sidebar
            persistToServer(); // write to projects.json
        }

        function deleteProject() {
            if(!confirm("Delete this project? (Temporary, refresh to restore)")) return;
            projects = projects.filter(x => x.id !== activeId);
            activeId = null;
            document.getElementById('editorUI').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            renderList();
            
            // Show a special toast for temporary delete
            const t = document.getElementById('toast');
            t.style.display = 'block';
            t.className = 'toast';
            t.textContent = 'Removed from UI (Temporary)';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        init();
    </script>
</body>
</html>
